<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LAMMPS Workbench Web Safe Mode</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">LAMMPS Workbench</p>
      <h1>Web Safe Mode</h1>
    </div>
    <span class="version" id="versionBadge">core</span>
  </header>

  <main class="layout">
    <section class="notice">
      <h2>注意</h2>
      <p>本Web版は公開デモ条件によるLAMMPS入力ファイル作成・操作確認用です。</p>
      <p>社内材料名、顧客情報、未公開試験条件、開発テーマに紐づく条件は入力しないでください。</p>
      <p>本Web版は解析実行、ファイルアップロード、外部保存を行いません。</p>
      <p>社内条件を扱う場合は、所属組織の情報管理ルールに従い、会社管理下のローカル版または社内版を使用してください。</p>
    </section>

    <section class="panel">
      <h2>Case</h2>
      <div id="caseForm" class="form-grid"></div>
      <div class="actions">
        <button id="generateButton" type="button">生成</button>
        <button id="downloadCaseButton" type="button">case.json</button>
        <button id="downloadInputButton" type="button">in.lammps</button>
        <button id="downloadProcedureButton" type="button">procedure.md</button>
      </div>
      <p id="status" class="status">未生成</p>
    </section>

    <section class="output-grid">
      <div class="panel">
        <h2>case.json</h2>
        <textarea id="caseOutput" spellcheck="false"></textarea>
      </div>
      <div class="panel">
        <h2>in.lammps</h2>
        <textarea id="inputOutput" spellcheck="false"></textarea>
      </div>
      <div class="panel wide">
        <h2>procedure.md</h2>
        <textarea id="procedureOutput" spellcheck="false"></textarea>
      </div>
    </section>
  </main>

  <script src="../../core/caseDefinitions.js"></script>
  <script src="../../core/lammpsCase.js"></script>
  <script src="./webSafeApp.js"></script>
</body>
</html>
